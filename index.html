<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cifrador Cesar / Atbash (ASCII)</title>

  <style>
    :root{
      --bg1:#070A12; --bg2:#0B1430;
      --card: rgba(255,255,255,.08);
      --card2: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.14);
      --text: #EAF0FF;
      --muted:#B9C4E2;
      --accent:#7C5CFF;
      --accent2:#00D4FF;
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; color:var(--text);
      font-family: system-ui, Arial, sans-serif;
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(124,92,255,.35), transparent 60%),
        radial-gradient(800px 500px at 85% 15%, rgba(0,212,255,.25), transparent 55%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
    }
    header{
      padding:18px 16px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(10,14,28,.6);
      backdrop-filter: blur(10px);
      position: sticky; top:0;
    }
    h1{margin:0;font-size:18px}
    .small{margin-top:6px;font-size:12.5px;color:var(--muted)}
    main{max-width:980px;margin:0 auto;padding:18px 14px 34px;display:grid;gap:14px}
    .card{
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .row3{display:grid;grid-template-columns:1.2fr .8fr 1fr;gap:12px}
    @media (max-width: 820px){.row,.row3{grid-template-columns:1fr}}
    label{display:block;margin:12px 0 6px;font-size:12.5px;color:var(--muted)}
    textarea,input,select{
      width:100%; border-radius:14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(10,14,28,.55);
      color: var(--text);
      padding: 11px 12px;
      font-size: 14px;
      outline:none;
    }
    textarea{min-height:110px;resize:vertical}
    .hint{margin-top:8px;font-size:12px;color: rgba(185,196,226,.9)}
    .out{
      min-height:110px;border-radius:14px;
      border:1px dashed rgba(255,255,255,.22);
      background: rgba(10,14,28,.35);
      padding: 12px; white-space: pre-wrap;
    }
    button{
      border:0;border-radius:14px;padding:11px 13px;
      font-weight:700;cursor:pointer;
    }
    .btn{color:#07101d;background: linear-gradient(90deg, var(--accent), var(--accent2));}
    .btn2{color:var(--text);background: rgba(255,255,255,.10);border: 1px solid rgba(255,255,255,.14);}
    footer{padding:18px 14px 26px;text-align:center;color: rgba(185,196,226,.75);font-size:12px}
    #info{margin-top:10px;color: rgba(255,230,190,.95)}
  </style>
</head>

<body>
<header>
  <h1>Cifrador / Descifrador: Cesar y Atbash (ASCII)</h1>
  <div class="small">El alfabeto se puede cambiar. El boton ASCII carga caracteres 32 a 126.</div>
</header>

<main>
  <section class="card">
    <div class="row3">
      <div>
        <label for="mode">Modulo</label>
        <select id="mode">
          <option value="cesar">Cesar</option>
          <option value="atbash">Atbash</option>
          <option value="detect">Detectar</option>
        </select>
      </div>
      <div>
        <label for="action">Accion</label>
        <select id="action">
          <option value="encrypt">Cifrar</option>
          <option value="decrypt">Descifrar</option>
        </select>
      </div>
      <div>
        <label for="shift">Shift (solo Cesar)</label>
        <input id="shift" type="number" value="3" min="-9999" max="9999" />
      </div>
    </div>

    <label for="alphabet">Alfabeto</label>
    <textarea id="alphabet">ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,;:!?()[]{}-_"'@#$%&/+=*<>|~`^</textarea>

    <div class="hint">
      Evita repetir caracteres. Si quieres usar ASCII, usa el boton.
      <br>
      <button class="btn2" id="loadAscii" type="button">Cargar ASCII imprimible (32-126)</button>
    </div>
  </section>

  <section class="card">
    <div class="row">
      <div>
        <label for="input">Texto</label>
        <textarea id="input" placeholder="Escribe aqui..."></textarea>
      </div>
      <div>
        <label>Salida</label>
        <div id="output" class="out"></div>
        <div class="hint" id="info"></div>
      </div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
      <button class="btn" id="run" type="button">Ejecutar</button>
      <button class="btn2" id="swap" type="button">Intercambiar</button>
      <button class="btn2" id="clear" type="button">Limpiar</button>
    </div>
  </section>
</main>

<footer>Universidad Autonoma de Aguascalientes</footer>

<script>
  // Regresa ASCII imprimible: caracteres del 32 al 126
  function asciiImprimible() {
    let cadena = "";
    for (let codigo = 32; codigo <= 126; codigo++) cadena += String.fromCharCode(codigo);
    return cadena;
  }

  // Quita duplicados manteniendo el orden (evita errores en el alfabeto)
  function alfabetoUnico(texto) {
    let resultado = "";
    for (let i = 0; i < texto.length; i++) {
      if (!resultado.includes(texto[i])) resultado += texto[i];
    }
    return resultado;
  }

  function modulo(n, m) {
    return ((n % m) + m) % m;
  }

  // Cesar: mueve el indice del caracter segun el shift
  function cifrarCesar(texto, alfabeto, desplazamiento) {
    let resultado = "";
    for (let i = 0; i < texto.length; i++) {
      const caracter = texto[i];
      const posicion = alfabeto.indexOf(caracter);
      if (posicion === -1) { resultado += caracter; continue; }
      resultado += alfabeto[ modulo(posicion + desplazamiento, alfabeto.length) ];
    }
    return resultado;
  }

  // Atbash: espejo dentro del alfabeto (pos -> L-1-pos)
  function cifrarAtbash(texto, alfabeto) {
    let resultado = "";
    const largo = alfabeto.length;
    for (let i = 0; i < texto.length; i++) {
      const caracter = texto[i];
      const posicion = alfabeto.indexOf(caracter);
      if (posicion === -1) { resultado += caracter; continue; }
      resultado += alfabeto[(largo - 1) - posicion];
    }
    return resultado;
  }

  // Detector simple: prueba atbash y varios shifts y elige el que genere mas espacios/letras
  function detectar(texto, alfabeto) {
    function puntaje(cadena){
      let puntos = 0;
      for (let i = 0; i < cadena.length; i++) {
        const caracter = cadena[i];
        if (caracter === " ") puntos += 2;
        else if ((caracter >= "A" && caracter <= "Z") || (caracter >= "a" && caracter <= "z")) puntos += 1;
        else if (caracter >= "0" && caracter <= "9") puntos += 0.3;
      }
      return puntos;
    }

    const salidaAtbash = cifrarAtbash(texto, alfabeto);
    let mejor = { tipo:"Atbash", desplazamiento:0, salida:salidaAtbash, puntos:puntaje(salidaAtbash) };

    for (let desplaz = 0; desplaz < alfabeto.length; desplaz++) {
      const candidato = cifrarCesar(texto, alfabeto, -desplaz);
      const puntos = puntaje(candidato);
      if (puntos > mejor.puntos) mejor = { tipo:"Cesar", desplazamiento:desplaz, salida:candidato, puntos:puntos };
    }

    return mejor;
  }

  const moduloSelect = document.getElementById("mode");
  const accionSelect = document.getElementById("action");
  const shiftInput = document.getElementById("shift");
  const alfabetoTextarea = document.getElementById("alphabet");
  const textoTextarea = document.getElementById("input");
  const salidaDiv = document.getElementById("output");
  const infoDiv = document.getElementById("info");

  document.getElementById("loadAscii").addEventListener("click", () => {
    alfabetoTextarea.value = asciiImprimible();
  });

  function actualizarShift() {
    const esCesar = moduloSelect.value === "cesar";
    shiftInput.disabled = !esCesar;
    shiftInput.style.opacity = esCesar ? "1" : "0.6";
  }

  document.getElementById("run").addEventListener("click", () => {
    const alfabeto = alfabetoUnico(alfabetoTextarea.value);
    alfabetoTextarea.value = alfabeto;

    const texto = textoTextarea.value || "";
    infoDiv.textContent = "";

    if (alfabeto.length < 2) {
      salidaDiv.textContent = "El alfabeto debe tener al menos 2 caracteres.";
      return;
    }

    const modo = moduloSelect.value;
    const accion = accionSelect.value;

    if (modo === "cesar") {
      const desplaz = parseInt(shiftInput.value, 10) || 0;
      const desplazReal = (accion === "encrypt") ? desplaz : -desplaz;
      salidaDiv.textContent = cifrarCesar(texto, alfabeto, desplazReal);
      return;
    }

    if (modo === "atbash") {
      salidaDiv.textContent = cifrarAtbash(texto, alfabeto);
      return;
    }

    if (modo === "detect") {
      const resultado = detectar(texto, alfabeto);
      salidaDiv.textContent = resultado.salida;
      if (resultado.tipo === "Cesar") infoDiv.textContent = "Detectado: Cesar (shift sugerido: " + resultado.desplazamiento + ")";
      else infoDiv.textContent = "Detectado: Atbash";
      return;
    }
  });

  document.getElementById("swap").addEventListener("click", () => {
    const temporal = textoTextarea.value;
    textoTextarea.value = salidaDiv.textContent;
    salidaDiv.textContent = temporal;
    infoDiv.textContent = "";
  });

  document.getElementById("clear").addEventListener("click", () => {
    textoTextarea.value = "";
    salidaDiv.textContent = "";
    infoDiv.textContent = "";
  });

  moduloSelect.addEventListener("change", actualizarShift);
  actualizarShift();
</script>
</body>
</html>
